openapi: 3.0.3
info:
  title: MadMen API
  version: 0.1.0
  description: >
    API du Module 1 — **Gestion Intelligente des Employés & Contrôle des Postes de Travail**.

    Routes actives : Système (`/`, `/health`), Employés (CRUD complet), Présence,
    Sessions, Alertes et Tableau de bord. Le « Try it out » de Swagger fonctionne en direct.
servers:
  - url: https://api-madmen.ssmanager.uk
    description: Serveur en ligne (production)
  - url: http://127.0.0.1:8000
    description: Serveur de développement local

tags:
  - name: Authentification
    description: Connexion dashboard (Matricule + PIN → jeton JWT avec rôle) et RBAC
  - name: Système
    description: Santé et métadonnées de l'API
  - name: Employés
    description: Enrôlement et gestion des employés
  - name: Présence
    description: Pointage biométrique
  - name: Biométrie
    description: Enrôlement des empreintes / badges RFID / visages
  - name: Sessions
    description: Sessions de travail et surveillance des postes
  - name: Alertes
    description: Notifications temps réel aux supérieurs
  - name: Tableau de bord
    description: Indicateurs présence / activité / productivité
  - name: Productivité
    description: Classement et détail de productivité (interface DG)
  - name: Pointeuse K40
    description: Terminal de pointage réseau ZKTeco K40 (arrivée/départ par empreinte)
  - name: Synchronisation
    description: Synchro montante offline-first (clients qui rejouent leurs événements bufferisés)
  - name: Configuration
    description: Paramètres front et cache hors-ligne des postes
  - name: Horaires
    description: Horaire de travail par employé (planning par jour)
  - name: Paie
    description: Bulletins et synthèse de paie mensuelle
  - name: Jours fériés
    description: Journées payées non comptées comme absence
  - name: Messagerie
    description: Communication interne (conversations directes/groupes, pièces jointes)
  - name: Fichiers
    description: Pièces jointes de la messagerie (image, audio, PDF, document)
  - name: Surveillance kiosque
    description: Journal d'activité du kiosque (sans impact sur la paie)

paths:
  /:
    get:
      tags: [Système]
      summary: Informations sur l'API
      responses:
        '200':
          description: Métadonnées de l'API
  /health:
    get:
      tags: [Système]
      summary: Vérifier la connexion à la base de données
      responses:
        '200':
          description: API et DB opérationnelles
          content:
            application/json:
              schema:
                type: object
                properties:
                  status: { type: string, example: ok }
                  db: { type: string, example: connected }

  /api/employes:
    get:
      tags: [Employés]
      summary: Lister les employés
      parameters:
        - { in: query, name: departement_id, schema: { type: integer }, description: Filtrer par département }
        - { in: query, name: statut, schema: { type: string, enum: [actif, suspendu, conge] } }
      responses:
        '200':
          description: Liste des employés
          content:
            application/json:
              schema:
                type: array
                items: { $ref: '#/components/schemas/Employe' }
    post:
      tags: [Employés]
      summary: Créer un employé (matricule + PIN auto-générés)
      description: >
        Seuls `nom` et `prenom` sont requis. Le `matricule` (EMP-NNNN) est généré
        automatiquement s'il n'est pas fourni, et un code PIN à 4 chiffres UNIQUE est
        TOUJOURS généré côté serveur. La réponse contient `code_pin_genere` (PIN en clair,
        affiché une seule fois).
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/EmployeInput' }
      responses:
        '201':
          description: Employé créé. `code_pin_genere` = le PIN en clair (à noter, non ré-affiché).
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/Employe'
                  - type: object
                    properties:
                      code_pin_genere: { type: string, example: "8334", description: PIN généré en clair (affiché une seule fois) }
        '409': { description: PIN déjà partagé par plusieurs comptes, ou collision de matricule }
        '422': { $ref: '#/components/responses/ValidationError' }

  /api/employes/{id}:
    parameters:
      - { in: path, name: id, required: true, schema: { type: integer } }
    get:
      tags: [Employés]
      summary: Détail d'un employé
      responses:
        '200':
          description: Employé
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Employe' }
        '404': { $ref: '#/components/responses/NotFound' }
    put:
      tags: [Employés]
      summary: Mettre à jour un employé
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/EmployeInput' }
      responses:
        '200':
          description: Employé mis à jour
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Employe' }
        '404': { $ref: '#/components/responses/NotFound' }
    delete:
      tags: [Employés]
      summary: Supprimer un employé
      responses:
        '204': { description: Supprimé }
        '404': { $ref: '#/components/responses/NotFound' }

  /api/employes/{id}/regenerer-pin:
    parameters:
      - { in: path, name: id, required: true, schema: { type: integer } }
    post:
      tags: [Employés]
      summary: Régénérer le code PIN (cas du PIN oublié)
      description: Génère un nouveau PIN à 4 chiffres UNIQUE et le renvoie en clair. Réservé au super_admin.
      responses:
        '200':
          description: Nouveau PIN généré
          content:
            application/json:
              schema:
                type: object
                properties:
                  id: { type: integer }
                  matricule: { type: string }
                  code_pin_genere: { type: string, example: "3876" }
        '404': { $ref: '#/components/responses/NotFound' }

  /api/config/biometrie:
    get:
      tags: [Biométrie]
      summary: Configuration biométrique (pour le front)
      description: Valeurs non sensibles utilisées par la page d'enrôlement (device, URL du service local, seuil, mode simulation).
      responses:
        '200':
          description: Configuration
          content:
            application/json:
              schema:
                type: object
                properties:
                  device: { type: string, example: zkteco }
                  bridge_url: { type: string, example: "http://127.0.0.1:8080" }
                  samples: { type: integer, example: 3 }
                  threshold: { type: integer, example: 55 }
                  template_format: { type: string, example: ansi }
                  simulation: { type: boolean, example: true }

  /api/employes/{id}/biometrie:
    parameters:
      - { in: path, name: id, required: true, schema: { type: integer }, description: ID employé }
    get:
      tags: [Biométrie]
      summary: Lister les biométries enrôlées d'un employé
      description: Retourne les métadonnées (jamais le gabarit lui-même).
      responses:
        '200':
          description: Liste des enrôlements
        '404': { $ref: '#/components/responses/NotFound' }
    post:
      tags: [Biométrie]
      summary: Enrôler une biométrie (empreinte / rfid / facial)
      description: >
        La **capture** se fait côté device (front) via le SDK du lecteur, qui produit un
        gabarit. Le front envoie ce gabarit en base64. L'API le **chiffre (AES-256-GCM)**
        avant stockage. Pour le type `rfid`, envoyer `badge_rfid` au lieu de `template`.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [type]
              properties:
                type: { type: string, enum: [empreinte, rfid, facial] }
                doigt: { type: string, nullable: true, example: index_droit }
                template: { type: string, description: "Gabarit en base64 (empreinte/facial)", example: "Qk9EWS1URU1QTEFURQ==" }
                badge_rfid: { type: string, description: "UID du badge (type rfid)", example: "BADGE-0001" }
      responses:
        '201': { description: Biométrie enrôlée }
        '422': { $ref: '#/components/responses/ValidationError' }
        '404': { $ref: '#/components/responses/NotFound' }

  /api/biometrie/{id}:
    delete:
      tags: [Biométrie]
      summary: Supprimer une biométrie enrôlée
      parameters:
        - { in: path, name: id, required: true, schema: { type: integer } }
      responses:
        '204': { description: Supprimée }
        '404': { $ref: '#/components/responses/NotFound' }

  /api/pointages:
    get:
      tags: [Présence]
      summary: Lister les pointages
      parameters:
        - { in: query, name: employe_id, schema: { type: integer } }
        - { in: query, name: date, schema: { type: string, format: date } }
      responses:
        '200':
          description: Liste des pointages
          content:
            application/json:
              schema:
                type: array
                items: { $ref: '#/components/schemas/Pointage' }
    post:
      tags: [Présence]
      summary: Enregistrer un pointage (arrivée / sortie)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [employe_id, methode]
              properties:
                employe_id: { type: integer }
                appareil_id: { type: integer, nullable: true }
                methode: { type: string, enum: [empreinte, rfid, facial, pin] }
      responses:
        '201':
          description: Pointage enregistré
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Pointage' }

  /api/sessions:
    get:
      tags: [Sessions]
      summary: Lister les sessions de travail
      parameters:
        - { in: query, name: statut, schema: { type: string, enum: [ouverte, verrouillee, fermee] } }
      responses:
        '200':
          description: Liste des sessions
          content:
            application/json:
              schema:
                type: array
                items: { $ref: '#/components/schemas/SessionTravail' }

  /api/sessions/login:
    post:
      tags: [Sessions]
      summary: Ouvrir une session (Matricule + Code PIN + empreinte)
      description: >
        Vérifie le PIN (côté backend), l'autorisation sur le poste, puis ouvre la session.
        L'empreinte est validée côté device et transmise via `empreinte_ok`.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [matricule, code_pin, poste_travail_code]
              properties:
                matricule: { type: string, example: EMP-0003 }
                code_pin: { type: string, example: "1002" }
                poste_travail_code: { type: string, example: PC-COMP-02 }
                empreinte_ok: { type: boolean, example: true, description: "Empreinte validée par le lecteur" }
      responses:
        '201': { description: Session ouverte }
        '401': { description: Identifiants invalides }
        '403': { description: Non autorisé sur ce poste }

  /api/sessions/identifier:
    post:
      tags: [Sessions]
      summary: Ouvrir une session par empreinte (identification 1:N)
      description: >
        Connexion sans matricule ni PIN. Le matching réel de gabarits (ANSI/ISO) n'est pas
        réalisable en PHP pur : il est délégué au service ZKBioOnline / au device, qui résout
        l'empreinte capturée en un `employe_id`.


        - **Mode simulation** (`BIO_SIMULATION=true`) : l'identification est simulée — le backend
          choisit un employé ayant une empreinte enrôlée active et autorisé sur le poste, puis
          ouvre la session. La réponse porte `"simulated": true`.


        - **Mode réel** (`BIO_SIMULATION=false`) : ZKBioOnline / le device effectue le matching et
          doit fournir l'`employe_id`. Sans `employe_id`, l'API renvoie `501` (service biométrique requis).
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [poste_travail_code]
              properties:
                poste_travail_code: { type: string, example: PC-COMP-02 }
                template:
                  type: string
                  description: "Gabarit capturé en base64 (optionnel ; ignoré en simulation)."
                  example: "QU5TSS1URU1QTEFURQ=="
                employe_id:
                  type: integer
                  description: "Employé résolu par ZKBioOnline/device. Requis en mode réel."
                  example: 3
      responses:
        '201': { description: "Session ouverte. Contient `simulated`, `session` et `employe`." }
        '404': { description: Poste inconnu, ou aucun employé éligible (simulation) }
        '422': { description: Champ manquant, ou employé sans empreinte enrôlée }
        '501': { description: Service biométrique requis (mode réel, employe_id manquant) }

  /api/sessions/{id}/lock:
    post:
      tags: [Sessions]
      summary: Verrouiller la session (inactivité)
      description: Crée un incident d'inactivité et alerte le supérieur.
      parameters:
        - { in: path, name: id, required: true, schema: { type: integer } }
      responses:
        '200': { description: Session verrouillée }
        '404': { $ref: '#/components/responses/NotFound' }

  /api/sessions/{id}/unlock:
    post:
      tags: [Sessions]
      summary: Reprendre la session (PIN + motif)
      parameters:
        - { in: path, name: id, required: true, schema: { type: integer } }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [code_pin]
              properties:
                code_pin: { type: string, example: "1002" }
                motif_id: { type: integer, example: 4, description: "Réf. motif_absence" }
                justification: { type: string, example: "Pause café" }
      responses:
        '200': { description: Session reprise }
        '401': { description: PIN invalide }
        '404': { $ref: '#/components/responses/NotFound' }

  /api/sessions/{id}/logout:
    post:
      tags: [Sessions]
      summary: Fermer la session
      description: Calcule les durées active/inactive et libère le poste.
      parameters:
        - { in: path, name: id, required: true, schema: { type: integer } }
      responses:
        '200': { description: Session fermée }
        '404': { $ref: '#/components/responses/NotFound' }

  /api/sessions/{id}/activite:
    post:
      tags: [Sessions]
      summary: Heartbeat de surveillance (échantillon d'activité)
      parameters:
        - { in: path, name: id, required: true, schema: { type: integer } }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                mouvements_souris: { type: integer, example: 320 }
                frappes_clavier: { type: integer, example: 1200 }
                app_active: { type: string, example: Excel }
                niveau_activite: { type: string, enum: [actif, inactif], example: actif }
      responses:
        '201': { description: Activité enregistrée }
        '404': { $ref: '#/components/responses/NotFound' }

  /api/alertes:
    get:
      tags: [Alertes]
      summary: Lister les alertes
      parameters:
        - { in: query, name: destinataire_id, schema: { type: integer }, description: Supérieur destinataire }
        - { in: query, name: lu, schema: { type: boolean } }
      responses:
        '200':
          description: Liste des alertes
          content:
            application/json:
              schema:
                type: array
                items: { $ref: '#/components/schemas/Alerte' }

  /api/dashboard/presence:
    get:
      tags: [Tableau de bord]
      summary: Résumé présence du jour
      responses:
        '200':
          description: Compteurs de présence
          content:
            application/json:
              schema:
                type: object
                properties:
                  presents: { type: integer, example: 42 }
                  absents: { type: integer, example: 5 }
                  en_conge: { type: integer, example: 3 }
                  actifs: { type: integer, example: 38 }
                  inactifs: { type: integer, example: 4 }

  /api/productivite/classement:
    get:
      tags: [Productivité]
      summary: Classement des employés par productivité
      description: >
        Classe les employés selon leur taux de productivité moyen sur la période.
        Idéal pour le « classement des meilleurs employés » de l'interface DG.
      parameters:
        - in: query
          name: periode
          schema: { type: string, enum: [mois, trimestre, semestre, tout] }
          description: Raccourci de période (sinon utiliser from/to)
        - { in: query, name: from, schema: { type: string, format: date }, description: Date de début }
        - { in: query, name: to, schema: { type: string, format: date }, description: Date de fin }
        - { in: query, name: departement_id, schema: { type: integer } }
        - { in: query, name: limit, schema: { type: integer, default: 20, maximum: 100 } }
        - { in: query, name: ordre, schema: { type: string, enum: [desc, asc], default: desc } }
      responses:
        '200':
          description: Classement
          content:
            application/json:
              schema:
                type: object
                properties:
                  periode: { type: string, example: tout }
                  classement:
                    type: array
                    items: { $ref: '#/components/schemas/ClassementLigne' }

  /api/productivite/{id}:
    get:
      tags: [Productivité]
      summary: Détail de productivité d'un employé
      description: Agrégats + série quotidienne (pour graphiques).
      parameters:
        - { in: path, name: id, required: true, schema: { type: integer } }
        - { in: query, name: periode, schema: { type: string, enum: [mois, trimestre, semestre, tout] } }
        - { in: query, name: from, schema: { type: string, format: date } }
        - { in: query, name: to, schema: { type: string, format: date } }
      responses:
        '200':
          description: Détail productivité
        '404': { $ref: '#/components/responses/NotFound' }

  /api/auth/login:
    post:
      tags: [Authentification]
      summary: Connexion (Matricule + Code PIN) → jeton JWT
      description: >
        Vérifie le matricule + PIN (haché) et renvoie un jeton JWT portant le
        **rôle** (super_admin / directeur / superviseur / employe). Route publique.
        Le jeton est ensuite envoyé en `Authorization: Bearer <token>`.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [matricule, code_pin]
              properties:
                matricule: { type: string, example: EMP-0001 }
                code_pin: { type: string, example: "1000" }
      responses:
        '200':
          description: Jeton + profil
          content:
            application/json:
              schema:
                type: object
                properties:
                  token: { type: string }
                  employe:
                    type: object
                    properties:
                      id: { type: integer }
                      matricule: { type: string }
                      nom: { type: string }
                      prenom: { type: string }
                      role: { type: string, enum: [super_admin, directeur, superviseur, employe] }
        '401': { description: Identifiants invalides }

  /api/auth/me:
    get:
      tags: [Authentification]
      summary: Utilisateur courant (depuis le jeton)
      security: [{ bearerAuth: [] }]
      responses:
        '200': { description: Profil courant (id, matricule, role) }
        '401': { description: Non authentifié }

  /api/sync:
    post:
      tags: [Synchronisation]
      summary: Synchroniser un lot d'événements bufferisés (offline-first)
      description: >
        Un client (agent poste, APK, web) renvoie ici les événements créés
        HORS-LIGNE quand il reconnecte. Chaque événement porte un `client_uuid`
        (clé UNIQUE) : rejouer le même n'insère pas de doublon (idempotent).
        Ordre interne : sessions d'abord, puis pointages, puis activités/incidents
        (qui référencent une session via `session_client_uuid`).
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [events]
              properties:
                events:
                  type: array
                  items:
                    type: object
                    required: [type, client_uuid]
                    properties:
                      type: { type: string, enum: [session, pointage, activite, incident] }
                      client_uuid: { type: string, format: uuid }
                      session_client_uuid: { type: string, format: uuid, description: "Pour activite/incident : rattache à une session du lot" }
                      employe_id: { type: integer }
                      poste_travail_code: { type: string, example: PC-COMP-02 }
            example:
              events:
                - { type: session, client_uuid: "8f1c...-001", employe_id: 3, poste_travail_code: PC-COMP-02, heure_debut: "2026-06-20 08:00:00", heure_fin: "2026-06-20 17:00:00", statut: fermee }
                - { type: pointage, client_uuid: "8f1c...-002", employe_id: 3, date: "2026-06-20", heure_entree: "2026-06-20 08:00:00" }
      responses:
        '200':
          description: Résumé de la synchro
          content:
            application/json:
              schema:
                type: object
                properties:
                  recus: { type: integer, example: 3 }
                  acceptes: { type: integer, example: 3 }
                  doublons: { type: integer, example: 0 }
                  erreurs: { type: array, items: { type: object } }
                  accepted_uuids: { type: array, items: { type: string } }
        '422': { $ref: '#/components/responses/ValidationError' }

  /iclock/cdata:
    get:
      tags: [Pointeuse K40]
      summary: "[Push/ADMS] Handshake du terminal K40"
      description: >
        Mode PUSH (le K40 envoie vers l'API). Le terminal appelle cette route au
        démarrage ; l'API renvoie ses options (text/plain). Route publique
        (identifiée par le SN du terminal). Active si `K40_MODE=push|both`.
      parameters:
        - { in: query, name: SN, schema: { type: string }, description: Numéro de série du terminal }
        - { in: query, name: options, schema: { type: string } }
      responses:
        '200':
          description: Options du terminal (text/plain)
          content:
            text/plain:
              schema: { type: string }
    post:
      tags: [Pointeuse K40]
      summary: "[Push/ADMS] Le K40 pousse ses données (pointages)"
      description: >
        `table=ATTLOG` : le corps contient les pointages (lignes
        `userid<TAB>timestamp<TAB>status<TAB>...`). Chaque ligne alimente la table
        `pointage` (arrivée/départ). Réponse `OK: <n>`.
      parameters:
        - { in: query, name: SN, schema: { type: string } }
        - { in: query, name: table, schema: { type: string, example: ATTLOG } }
      requestBody:
        content:
          text/plain:
            schema: { type: string, example: "3\t2026-06-20 08:05:00\t0\t1" }
      responses:
        '200':
          description: 'Acquittement text/plain, ex. OK suivi du nombre de lignes'
          content:
            text/plain:
              schema: { type: string }

  /iclock/getrequest:
    get:
      tags: [Pointeuse K40]
      summary: "[Push/ADMS] Le terminal demande des commandes"
      parameters:
        - { in: query, name: SN, schema: { type: string } }
      responses:
        '200':
          description: Commandes à exécuter (text/plain, "OK" si aucune)
          content:
            text/plain:
              schema: { type: string }

  /iclock/devicecmd:
    post:
      tags: [Pointeuse K40]
      summary: "[Push/ADMS] Résultat des commandes du terminal"
      parameters:
        - { in: query, name: SN, schema: { type: string } }
      responses:
        '200':
          description: Acquittement (text/plain "OK")
          content:
            text/plain:
              schema: { type: string }

  /api/k40/status:
    get:
      tags: [Pointeuse K40]
      summary: Tester la connexion au terminal K40
      responses:
        '200':
          description: État de la connexion
          content:
            application/json:
              schema:
                type: object
                properties:
                  connected: { type: boolean, example: false }
                  ip: { type: string, example: "192.168.1.201" }
                  port: { type: integer, example: 4370 }
                  version: { type: string }
                  error: { type: string }

  /api/k40/sync:
    post:
      tags: [Pointeuse K40]
      summary: Synchroniser les pointages du K40
      description: >
        Récupère les transactions du terminal (empreinte), les mappe aux employés
        (via device_user_id, sinon l'id), et remplit la table pointage (1er punch du
        jour = arrivée, dernier = départ). Idempotent (état de dernière synchro).
      responses:
        '200':
          description: Résumé de la synchro
          content:
            application/json:
              schema:
                type: object
                properties:
                  recus: { type: integer, example: 124 }
                  traites: { type: integer, example: 120 }
                  ignores: { type: integer, example: 4 }
                  employes_inconnus: { type: array, items: { type: string } }
                  derniere_synchro: { type: string, example: "2026-06-19 17:40:00" }
                  relais:
                    type: object
                    description: Résultat du relais vers le cloud (best-effort, n'échoue jamais la synchro locale).
                    properties:
                      ok: { type: boolean }
                      employes: { type: integer }
                      pointages: { type: integer }
                      erreur: { type: string }
        '502': { description: Terminal injoignable ou désactivé }

  /api/gateway/sync:
    post:
      tags: [Passerelle cloud]
      summary: Réception passerelle — le bureau pousse employés + pointages vers le cloud
      description: >
        Relais à SENS UNIQUE (bureau -> cloud). La passerelle locale envoie ses employés
        (upsert par matricule, ne touche jamais PIN/role) et ses pointages quotidiens
        (référencés par matricule). Authentification par jeton GATEWAY_TOKEN via l'en-tête
        Authorization: Bearer <token> (exemptée de l'auth JWT). Idempotent.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                employes:
                  type: array
                  items:
                    type: object
                    properties:
                      matricule: { type: string, example: "ADMIN-001" }
                      nom: { type: string }
                      prenom: { type: string }
                      email: { type: string, nullable: true }
                      statut: { type: string, example: "actif" }
                pointages:
                  type: array
                  items:
                    type: object
                    properties:
                      matricule: { type: string, example: "ADMIN-001" }
                      date: { type: string, example: "2026-06-23" }
                      heure_entree: { type: string, nullable: true }
                      heure_sortie: { type: string, nullable: true }
                      retard_minutes: { type: integer }
                      temps_present_minutes: { type: integer }
                      temps_pause_minutes: { type: integer }
                      nb_pauses: { type: integer }
                      statut: { type: string, example: "present" }
      responses:
        '200':
          description: Compte des éléments reçus / appliqués
          content:
            application/json:
              schema:
                type: object
                properties:
                  employes_recus: { type: integer }
                  employes_appliques: { type: integer }
                  pointages_recus: { type: integer }
                  pointages_appliques: { type: integer }
        '401': { description: Jeton passerelle invalide }

  /api/k40/users:
    get:
      tags: [Pointeuse K40]
      summary: Lister les utilisateurs enregistrés sur le terminal
      responses:
        '200': { description: Liste des utilisateurs du K40 }
        '502': { description: Terminal injoignable }

  /api/k40/push-user/{id}:
    post:
      tags: [Pointeuse K40]
      summary: Envoyer un employé vers le terminal K40
      description: Crée l'utilisateur sur le K40 (userid = device_user_id ou id de l'employé).
      parameters:
        - { in: path, name: id, required: true, schema: { type: integer } }
      responses:
        '200': { description: Employé envoyé }
        '404': { $ref: '#/components/responses/NotFound' }
        '502': { description: Terminal injoignable }

  /api/k40/push-all:
    post:
      tags: [Pointeuse K40]
      summary: Pousser tous les employés vers le K40 (une seule connexion)
      responses:
        '200': { description: Push groupé effectué }
        '502': { description: Terminal injoignable }
  /api/k40/clear-users:
    post:
      tags: [Pointeuse K40]
      summary: Effacer tous les utilisateurs du terminal K40
      responses:
        '200': { description: Terminal vidé }
        '502': { description: Terminal injoignable }
  /api/k40/push-fingerprints:
    post:
      tags: [Pointeuse K40]
      summary: Pousser les empreintes vers le K40 (pont Python pyzk)
      responses:
        '200': { description: Empreintes envoyées }
        '502': { description: Terminal injoignable }
  /api/k40/users/{id}:
    delete:
