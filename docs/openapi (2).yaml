components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      description: >
        Clé API statique. Requise sur les routes `/api/*` quand `AUTH_ENABLED=true`
        (en-tête `Authorization: Bearer <API_KEY>`). Routes publiques :
        `/`, `/health`, `/docs`, `/openapi.yaml` et `/iclock/*` (protocole terminal).
  responses:
    NotFound:
      description: Ressource introuvable
      content:
        application/json:
          schema: { $ref: '#/components/schemas/Error' }
    ValidationError:
      description: Données invalides
      content:
        application/json:
          schema: { $ref: '#/components/schemas/Error' }

  schemas:
    Error:
      type: object
      properties:
        error: { type: string, example: "Not Found" }

    ClassementLigne:
      type: object
      properties:
        rang: { type: integer, example: 1 }
        id: { type: integer, example: 11 }
        matricule: { type: string, example: EMP-0011 }
        nom: { type: string, example: Paul Garnier }
        departement: { type: string, example: Ressources Humaines }
        taux_moyen: { type: number, format: float, example: 95.6 }
        heures_travaillees: { type: number, format: float, example: 1045.9 }
        heures_inactivite: { type: number, format: float, example: 78.4 }
        retard_total_min: { type: integer, example: 1241 }
        total_arrets: { type: integer, example: 210 }
        jours_travailles: { type: integer, example: 123 }

    Departement:
      type: object
      properties:
        id: { type: integer }
        nom: { type: string, example: Comptabilité }
        code: { type: string, nullable: true, example: COMP }

    Poste:
      type: object
      properties:
        id: { type: integer }
        intitule: { type: string, example: Comptable }
        departement_id: { type: integer, nullable: true }

    Employe:
      type: object
      properties:
        id: { type: integer, example: 1 }
        matricule: { type: string, example: EMP-0001 }
        nom: { type: string, example: Dupont }
        prenom: { type: string, example: Jean }
        photo_url: { type: string, nullable: true }
        poste_id: { type: integer, nullable: true }
        departement_id: { type: integer, nullable: true }
        superieur_id: { type: integer, nullable: true }
        telephone: { type: string, nullable: true }
        adresse: { type: string, nullable: true }
        contact_urgence_nom: { type: string, nullable: true }
        contact_urgence_tel: { type: string, nullable: true }
        salaire: { type: number, format: float, nullable: true, example: 3500.00 }
        statut: { type: string, enum: [actif, suspendu, conge], example: actif }
        created_at: { type: string, format: date-time }

    EmployeInput:
      type: object
      required: [matricule, nom, prenom, code_pin]
      properties:
        matricule: { type: string, example: EMP-0001 }
        nom: { type: string, example: Dupont }
        prenom: { type: string, example: Jean }
        photo_url: { type: string, nullable: true }
        poste_id: { type: integer, nullable: true }
        departement_id: { type: integer, nullable: true }
        superieur_id: { type: integer, nullable: true }
        telephone: { type: string, nullable: true }
        adresse: { type: string, nullable: true }
        contact_urgence_nom: { type: string, nullable: true }
        contact_urgence_tel: { type: string, nullable: true }
        salaire: { type: number, format: float, nullable: true }
        code_pin: { type: string, description: "PIN en clair — sera haché côté serveur", example: "1234" }
        statut: { type: string, enum: [actif, suspendu, conge], default: actif }

    Pointage:
      type: object
      properties:
        id: { type: integer }
        employe_id: { type: integer }
        appareil_id: { type: integer, nullable: true }
        date: { type: string, format: date }
        heure_entree: { type: string, format: date-time, nullable: true }
        heure_sortie: { type: string, format: date-time, nullable: true }
        methode: { type: string, enum: [empreinte, rfid, facial, pin] }
        retard_minutes: { type: integer, example: 0 }
        statut: { type: string, enum: [present, absent, retard, conge] }

    SessionTravail:
      type: object
      properties:
        id: { type: integer }
        employe_id: { type: integer }
        poste_travail_id: { type: integer }
        heure_debut: { type: string, format: date-time }
        heure_fin: { type: string, format: date-time, nullable: true }
        statut: { type: string, enum: [ouverte, verrouillee, fermee] }
        duree_active_sec: { type: integer }
        duree_inactive_sec: { type: integer }

    Alerte:
      type: object
      properties:
        id: { type: integer }
        type: { type: string, enum: [inactivite, retard, absence, deconnexion, connexion_refusee] }
        employe_id: { type: integer, nullable: true }
        poste_travail_id: { type: integer, nullable: true }
        destinataire_id: { type: integer, nullable: true }
        message: { type: string, example: "Inactivité détectée — Pause café (7 min)" }
        horodatage: { type: string, format: date-time }
        lu: { type: boolean, example: false }
