server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # SPA : toute route inconnue retombe sur index.html.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Assets fingerprintés -> cache long.
    location /assets/ {
        expires 30d;
        add_header Cache-Control "public, immutable";
    }
}
